<?xml version="1.0" encoding="UTF-8"?>
<!--
  vMLX wordmark — `vmlx` set in a custom geometric grotesque. Constructed
  on a 7×4 unit grid (7 wide per glyph, 4 tall × line-height) so each
  letter shares stem widths and counter shapes.

  Glyph notes:
    v — clean two-diagonal V, no serif
    m — three vertical stems with a single horizontal crossbar at the
        top (references parallel batched inference)
    l — single vertical stem, full height
    x — two diagonals meeting in the center, mirrors the monogram

  Stroke width: 56 (canvas height 256, so 56/256 ≈ 22% — bold weight,
  reads well at 16pt).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 256" fill="none">
  <g fill="none" stroke="#0E0E11" stroke-width="56"
     stroke-linecap="square" stroke-linejoin="miter">

    <!-- v   (x: 32 → 232, width 200) -->
    <line x1="32"  y1="48"  x2="132" y2="220"/>
    <line x1="232" y1="48"  x2="132" y2="220"/>

    <!-- m   (x: 296 → 552, width 256, three stems + crossbar) -->
    <line x1="296" y1="220" x2="296" y2="48"/>
    <line x1="424" y1="220" x2="424" y2="100"/>
    <line x1="552" y1="220" x2="552" y2="48"/>
    <line x1="296" y1="48"  x2="552" y2="48"/>

    <!-- l   (x: 616, single vertical stem) -->
    <line x1="616" y1="32"  x2="616" y2="220"/>

    <!-- x   (x: 680 → 880) -->
    <line x1="680" y1="48"  x2="880" y2="220"/>
    <line x1="880" y1="48"  x2="680" y2="220"/>
  </g>

  <!-- Trailing accent dot — same blue as the monogram apex. -->
  <circle cx="952" cy="220" r="20" fill="#5B9DFF"/>
</svg>

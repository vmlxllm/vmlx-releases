<?xml version="1.0" encoding="UTF-8"?>
<!--
  Horizontal lockup: monogram badge on the left + wordmark on the right.
  Used as the website nav-bar logo, README header, and email signature.
  Aspect ratio 4:1 (1024×256) with consistent vertical padding so it
  drops into any container without alignment fuss.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 256" fill="none">
  <!-- Badge -->
  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="#0E0E11"/>
  <g fill="none" stroke="#F5F5F7" stroke-width="32"
     stroke-linecap="square" stroke-linejoin="miter">
    <line x1="52"  y1="60"  x2="128" y2="196"/>
    <line x1="204" y1="60"  x2="128" y2="196"/>
    <line x1="72"  y1="96"  x2="184" y2="96"/>
  </g>
  <circle cx="200" cy="200" r="12" fill="#5B9DFF"/>

  <!-- Wordmark, scaled + offset to sit alongside the badge -->
  <g transform="translate(304, 0) scale(0.78)">
    <g fill="none" stroke="#F5F5F7" stroke-width="56"
       stroke-linecap="square" stroke-linejoin="miter">
      <line x1="32"  y1="48"  x2="132" y2="220"/>
      <line x1="232" y1="48"  x2="132" y2="220"/>
      <line x1="296" y1="220" x2="296" y2="48"/>
      <line x1="424" y1="220" x2="424" y2="100"/>
      <line x1="552" y1="220" x2="552" y2="48"/>
      <line x1="296" y1="48"  x2="552" y2="48"/>
      <line x1="616" y1="32"  x2="616" y2="220"/>
      <line x1="680" y1="48"  x2="880" y2="220"/>
      <line x1="880" y1="48"  x2="680" y2="220"/>
    </g>
    <circle cx="952" cy="220" r="20" fill="#5B9DFF"/>
  </g>
</svg>
